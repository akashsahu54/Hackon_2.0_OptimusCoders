version: "3.9"

services:
  # ─── PostgreSQL Database ───
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: docusmart
      POSTGRES_USER: docusmart
      POSTGRES_PASSWORD: docusmart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ─── FastAPI Backend ───
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://docusmart:docusmart@db:5432/docusmart
    depends_on:
      - db
    volumes:
      - .:/app
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
